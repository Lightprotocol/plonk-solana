name: Rust

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.90.0"
  SOLANA_VERSION: "2.2.3"
  NODE_VERSION: "22"
  CIRCOM_VERSION: "v2.2.2"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          node-version: ${{ env.NODE_VERSION }}
          circom-version: ${{ env.CIRCOM_VERSION }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check README
        run: cargo rdme --check --force

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          solana-version: ${{ env.SOLANA_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          circom-version: ${{ env.CIRCOM_VERSION }}

      - name: Install npm dependencies
        run: npm install

      - name: Build test circuit
        run: ./tests/fixtures/scripts/setup.sh

      - name: Test workspace
        run: cargo test --workspace

      - name: Build SBF program
        run: cargo build-sbf --manifest-path tests/integration-program/Cargo.toml

      - name: Test SBF integration
        run: cargo test-sbf --manifest-path tests/integration-program/Cargo.toml
