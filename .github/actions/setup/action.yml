name: Setup Environment
description: Setup Rust, Solana, Node.js, Circom and SnarkJS for testing

inputs:
  rust-toolchain:
    description: "Rust toolchain version"
    required: false
    default: "1.90.0"
  solana-version:
    description: "Solana CLI version (leave empty to skip)"
    required: false
    default: ""
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  circom-version:
    description: "Circom version"
    required: false
    default: "v2.2.2"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: clippy, rustfmt
        cache: false

    - name: Cache Solana CLI
      if: inputs.solana-version != ''
      id: cache-solana
      uses: actions/cache@v4
      with:
        path: ~/.local/share/solana/install
        key: solana-${{ runner.os }}-${{ inputs.solana-version }}

    - name: Install Solana CLI
      if: inputs.solana-version != '' && steps.cache-solana.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sh -c "$(curl -sSfL https://release.anza.xyz/v${{ inputs.solana-version }}/install)"

    - name: Add Solana to PATH
      if: inputs.solana-version != ''
      shell: bash
      run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache circom installation
      id: cache-circom
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/circom
        key: circom-${{ runner.os }}-${{ inputs.circom-version }}

    - name: Install circom
      if: steps.cache-circom.outputs.cache-hit != 'true'
      shell: bash
      run: |
        wget -q https://github.com/iden3/circom/releases/download/${{ inputs.circom-version }}/circom-linux-amd64
        chmod +x circom-linux-amd64
        mv circom-linux-amd64 ~/.cargo/bin/circom

    - name: Cache cargo-rdme
      id: cache-rdme
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-rdme
        key: cargo-rdme-${{ runner.os }}

    - name: Install cargo-rdme
      if: steps.cache-rdme.outputs.cache-hit != 'true'
      shell: bash
      run: cargo install cargo-rdme --locked

    - name: Install snarkjs
      shell: bash
      run: npm install -g snarkjs

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Display versions
      shell: bash
      run: |
        rustc --version
        cargo --version
        node --version
        circom --version
        just --version
        if command -v solana &>/dev/null; then solana --version; fi
